<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=., initial-scale=1.0" />
    <title>StudyHub</title>
    <link rel="stylesheet" href="register.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
<body>
    <!-- Navbar Section -->
    <div id="Main-Navbar">
      <h2 style="color: rgb(17, 132, 199) ;">&#127760;StudyHub</h2>
      <ul type="none" class="Ul-Tag-Navbar">
        <a href="index.html"><li>Home</li></a>
        <a href="courses.html"><li>Courses</li></a>
        <!-- <a href="dashboard.html"><li>Dashboard</li></a> -->
        <a href="about.html"><li>About</li></a>
        <a href="contact.html"><li>Contact</li></a>
      </ul>
      <div id="Btn-Navbar">
        <button class="navbar-button1">Login</button>
        <button class="navbar-button2">Sign Up</button>
      </div>
    </div>

    <!-- register page form heading -->
     <div id="register-page-main">
     <div id="register-page-form-heading">
      <h1>Course Registeration</h1>
      <p>Fill In The Details Below To Enroll In The Course.</p>
     </div>


     <!-- register page form  -->
     <div class="register-page-form">
      <form action="">
        <label for="">Full Name</label>
        <br>
        <input required type="text" placeholder="Enter Your Full Name">
        <br>
        <br>
        <label for="">Email Address</label>
        <br>
        <input required type="text" placeholder="Enter Your Email">
        <br>
        <br>
         <label for="">Phone Number</label>
         <br>
        <input required type="text" placeholder="Enter Your Phone Number">
        <br>
        <br>
         <label for="">Select Course</label>
         <br>
        <select  name="" id="register-page-course-selection">
          <option>Choose A Course</option>
          <option value="">HTML</option>
       <option value="">CSS</option>
       <option value="">JavaScript</option>
       <option value="">React JS</option>
       <option value="">Responsive Web Design</option>
       <option value="">UI/UX Basics</option>
       <option value="">Git & GitUp</option>
        </select>
        <br>
        <br>
        <button class="submit-btn" >Submit</button>
      </form>
     </div>
    </div>

    <!-- footer section -->

    <div id="home-page-footer-section">
      <p>@ 2024 StudyHub As Rights Reserved.</p>
      <div id="icons">
      <i class="fa-brands fa-twitter"></i>
      <i class="fa-brands fa-facebook"></i>
      <i class="fa-brands fa-instagram"></i>
       <i class="fa-brands fa-linkedin"></i>
      </div>
    </div>


      <!-- Script Tag -->
     <script src="./register.js" defer></script>
</body>
</html>
