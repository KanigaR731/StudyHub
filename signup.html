    <!---- Sign up page Form  -->
    <div class="signup-page-form">
      <div id="signup-page-form-heading">
        <h1>Create An Account</h1>
        <p>Join Us Today! Create Your Account.</p>
      </div>
      <form class="signupform">
        <br />
        <br />
        <label for="">Full Name</label>
        <br />
        <input required type="text" placeholder="Enter Your Full Name" />
        <br />
        <br />
        <label for="">Email Address</label>
        <br />
        <input required type="email" placeholder="Enter Your Email" />
        <br />
        <br />
        <label for="">Password</label>
        <br />
        <input required type="password" placeholder="Enter Your Password" />
        <br />
        <br />
        <button style="color: white;" type="submit" class="signup">Sign Up</button>
      </form>
      <br />
      <div id="signup-foot-content">
        <p style="display: inline;">Already Have An Account?</p>
        <a href="./login.html" >Login</a>
      </div>
    </div>
